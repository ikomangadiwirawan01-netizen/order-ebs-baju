<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pemesanan Baju</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2196F3">

<style>
* { box-sizing: border-box; font-family: Arial, sans-serif; }

body {
    margin: 0;
    padding: 10px;
    background: #f4f4f4;
}

.container {
    max-width: 700px;
    margin: auto;
    background: #fff;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h2 { text-align: center; }

.note-box {
    background: #fff3cd;
    border: 2px solid #ffc107;
    color: #856404;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 15px;
    line-height: 1.5;
}

input[type="text"] {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
}

.radio-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.radio-group label {
    border: 2px solid #ccc;
    border-radius: 10px;
    padding: 8px 12px;
    cursor: pointer;
    transition: 0.2s;
    user-select: none;
}

.radio-group input {
    display: none;
}

.radio-group label.active {
    background: #2196F3;
    color: #fff;
    border-color: #2196F3;
    transform: scale(0.95);
}

.radio-group label:hover {
    border-color: #2196F3;
}

button {
    padding: 10px;
    margin: 5px 3px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
}

.btn {
    background: #2196F3;
    color: white;
}

table {
    width: 100%;
    margin-top: 15px;
    border-collapse: collapse;
    font-size: 13px;
}

th, td {
    padding: 8px;
    border: 1px solid #ddd;
    text-align: center;
}

.sent {
    background: #c8f7c5;
}

.table-wrapper {
    width: 100%;
    overflow-x: auto;
}
.info-box {
    background: #e8f5e9;
    border: 2px solid #25D366;
    color: #1b5e20;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 15px;
    line-height: 1.5;
}

.wa-btn {
    background: #25D366;
    color: white;
    margin-top: 10px;
}

@media (max-width: 768px) {
    table thead {
        display: none;
    }

    table, tbody, tr, td {
        display: block;
        width: 100%;
    }

    tr {
        background: #fff;
        margin-bottom: 10px;
        border-radius: 10px;
        padding: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    td {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border: none;
        border-bottom: 1px solid #eee;
        text-align: left;
    }

    td::before {
        content: attr(data-label);
        font-weight: bold;
        color: #555;
    }
}
</style>
</head>

<body>

<div class="container">
<h2>PEMESANAN BAJU</h2>

<div class="note-box">
    JIKA INGIN MEMESAN LEBIH DARI 1 BAJU, SILAKAN KLIK SIMPAN TERLEBIH DAHULU. SETELAH SEMUA DATA SUDAH BENAR, KLIK KIRIM KE GOOGLE SPREADSHEETS.
</div>
<div class="info-box">
    INFO TENTANG PEMESANAN DAPAT MENGHUBUNGI NOMER INI
    <br><br>

    <button class="wa-btn" onclick="hubungiWA1()">WA Mang Adi</button>
    <button class="wa-btn" onclick="hubungiWA2()">WA Admin 2</button>
</div>

<input type="text" id="nama" placeholder="Nama">

<label>Size:</label>
<div class="radio-group" onchange="toggleSize()">
    <label><input type="radio" name="size" value="XS"> XS</label>
    <label><input type="radio" name="size" value="S"> S</label>
    <label><input type="radio" name="size" value="M"> M</label>
    <label><input type="radio" name="size" value="L"> L</label>
    <label><input type="radio" name="size" value="XL"> XL</label>
    <label><input type="radio" name="size" value="XXL"> XXL</label>
    <label><input type="radio" name="size" value="XXXL"> XXXL</label>
    <label><input type="radio" name="size" value="Lainnya"> Lainnya</label>
</div>

<input type="text" id="sizeLainnya" placeholder="Isi size lainnya..." style="display:none;">

<label>Lengan:</label>
<div class="radio-group">
    <label><input type="radio" name="lengan" value="Pendek"> Pendek</label>
    <label><input type="radio" name="lengan" value="Panjang"> Panjang</label>
</div>

<label>Kategori Umur:</label>
<div class="radio-group" onchange="toggleGender()">
    <label><input type="radio" name="umur" value="Dewasa"> Dewasa</label>
    <label><input type="radio" name="umur" value="Anak-Anak"> Anak-Anak</label>
</div>

<label>Gender:</label>
<div class="radio-group" id="genderGroup">
    <label><input type="radio" name="gender" value="Cowok"> Cowok</label>
    <label><input type="radio" name="gender" value="Cewek"> Cewek</label>
</div>

<input type="text" id="hp" placeholder="No HP (boleh kosong)">

<button class="btn" onclick="simpan()">Simpan</button>
<button class="btn" onclick="kirimKeSheet()">Kirim ke Google Spreadsheet</button>

<div class="table-wrapper">
<table>
<thead>
<tr>
    <th>Nama</th>
    <th>Size</th>
    <th>Lengan</th>
    <th>Umur</th>
    <th>Gender</th>
    <th>No HP</th>
    <th>Waktu</th>
    <th>Status</th>
    <th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("orders")) || [];
let sentData = JSON.parse(localStorage.getItem("sent")) || [];

document.querySelectorAll(".radio-group label").forEach(label => {
    label.addEventListener("click", () => {
        let group = label.parentElement;
        group.querySelectorAll("label").forEach(l => l.classList.remove("active"));
        label.classList.add("active");
    });
});

function toggleSize(){
    let checked = document.querySelector('input[name="size"]:checked');
    let input = document.getElementById("sizeLainnya");

    if(checked && checked.value === "Lainnya"){
        input.style.display = "block";
    } else {
        input.style.display = "none";
        input.value = "";
    }
}

function toggleGender(){
    let checked = document.querySelector('input[name="umur"]:checked');
    let genderGroup = document.getElementById("genderGroup");

    if(checked && checked.value === "Anak-Anak"){
        genderGroup.style.display = "none";

        document.querySelectorAll('input[name="gender"]').forEach(g => {
            g.checked = false;
        });

        genderGroup.querySelectorAll("label").forEach(l => {
            l.classList.remove("active");
        });
    } else {
        genderGroup.style.display = "flex";
    }
}

function isDuplicate(newData){
    return [...data, ...sentData].some(d =>
        d.nama === newData.nama &&
        d.size === newData.size &&
        d.lengan === newData.lengan &&
        d.umur === newData.umur &&
        d.gender === newData.gender &&
        d.hp === newData.hp
    );
}

function ambilForm(){
    let nama = document.getElementById("nama").value.trim();
    let hp = document.getElementById("hp").value.trim();

    let sizeInput = document.querySelector('input[name="size"]:checked');
    let lenganInput = document.querySelector('input[name="lengan"]:checked');
    let umurInput = document.querySelector('input[name="umur"]:checked');
    let genderInput = document.querySelector('input[name="gender"]:checked');

    if(!nama || !sizeInput || !lenganInput || !umurInput){
        alert("Isi data wajib");
        return null;
    }

    let size = sizeInput.value;
    let lengan = lenganInput.value;
    let umur = umurInput.value;
    let gender = "";

    if(size === "Lainnya"){
        size = document.getElementById("sizeLainnya").value.trim();

        if(!size){
            alert("Isi size lainnya");
            return null;
        }
    }

    if(umur === "Dewasa"){
        if(!genderInput){
            alert("Pilih gender");
            return null;
        }

        gender = genderInput.value;
    }

    return {
        nama,
        size,
        lengan,
        umur,
        gender,
        hp,
        waktu: new Date().toLocaleString(),
        status: "Belum"
    };
}

function simpan(){
    let form = ambilForm();
    if(!form) return;

    if(isDuplicate(form)){
        alert("❌ Data sudah ada / pernah dikirim!");
        return;
    }

    data.push(form);
    localStorage.setItem("orders", JSON.stringify(data));

    render();
    resetForm();

    alert("✅ Data tersimpan di browser");
}

function render(){
    let tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    data.forEach((d, i) => {
        tbody.innerHTML += `
        <tr class="${d.status === 'Terkirim' ? 'sent' : ''}">
            <td data-label="Nama">${d.nama}</td>
            <td data-label="Size">${d.size}</td>
            <td data-label="Lengan">${d.lengan}</td>
            <td data-label="Umur">${d.umur}</td>
            <td data-label="Gender">${d.gender || "-"}</td>
            <td data-label="No HP">${d.hp || "-"}</td>
            <td data-label="Waktu">${d.waktu}</td>
            <td data-label="Status">${d.status}</td>
            <td data-label="Aksi">
                <button onclick="hapus(${i})">Hapus</button>
            </td>
        </tr>`;
    });
}

function hapus(i){
    data.splice(i, 1);
    localStorage.setItem("orders", JSON.stringify(data));
    render();
}

function kirimKeSheet(){
    let nama = document.getElementById("nama").value.trim();

    if(nama !== ""){
        let form = ambilForm();
        if(!form) return;

        if(isDuplicate(form)){
            alert("❌ Data sudah ada / pernah dikirim!");
            return;
        }

        let konfirmasi = confirm(
            "Silakan periksa kembali data Anda.\n\nKlik OK untuk langsung kirim ke Google Spreadsheet."
        );

        if(!konfirmasi){
            alert("❌ Pengiriman dibatalkan.");
            return;
        }

        kirim(form);

        form.status = "Terkirim";
        sentData.push(form);
        localStorage.setItem("sent", JSON.stringify(sentData));

        resetForm();

        alert("✅ Data berhasil dikirim ke Google Spreadsheet!");
        return;
    }

    data = JSON.parse(localStorage.getItem("orders")) || [];

    if(data.length === 0){
        alert("❌ Tidak ada data tersimpan untuk dikirim.");
        return;
    }

    let konfirmasi = confirm(
        "Ada " + data.length + " data tersimpan di tabel.\n\nKlik OK untuk kirim semua ke Google Spreadsheet, Klik CANCEL untuk memeriksa data kembali."
    );

    if(!konfirmasi){
        alert("❌ Pengiriman dibatalkan.");
        return;
    }

    data.forEach(d => {
        kirim(d);
        d.status = "Terkirim";
        sentData.push(d);
    });

    localStorage.setItem("sent", JSON.stringify(sentData));

    data = [];
    localStorage.removeItem("orders");
    render();
    resetForm();

    alert("✅ Semua data tersimpan berhasil dikirim ke Google Spreadsheet!");
}

function kirim(d){
    let f = new FormData();

    f.append("entry.602917443", d.nama);
    f.append("entry.1125006949", d.size);
    f.append("entry.851126045", d.lengan);
    f.append("entry.472633795", d.umur);
    f.append("entry.172735209", d.gender);
    f.append("entry.1294797526", d.hp);
    f.append("entry.804883247", d.waktu);

    fetch("https://docs.google.com/forms/u/0/d/e/1FAIpQLSe2Zhoa4FgmAjjytXKS-_onOXQQwt4xlfb_P8vYAYg0DWZajQ/formResponse", {
        method: "POST",
        mode: "no-cors",
        body: f
    });
}

function resetForm(){
    document.getElementById("nama").value = "";
    document.getElementById("hp").value = "";
    document.getElementById("sizeLainnya").value = "";
    document.getElementById("sizeLainnya").style.display = "none";

    document.querySelectorAll('input[type="radio"]').forEach(r => {
        r.checked = false;
    });

    document.querySelectorAll(".radio-group label").forEach(l => {
        l.classList.remove("active");
    });

    document.getElementById("genderGroup").style.display = "flex";
}
function hubungiWA1(){
    let nomor = "628814842970"; // nomor 1
    let pesan = "Halo Admin 1, saya ingin bertanya tentang pemesanan baju.";

    window.open(
        "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan),
        "_blank"
    );
}

function hubungiWA2(){
    let nomor = "6282222222222"; // nomor 2
    let pesan = "Halo Admin 2, saya ingin bertanya tentang pemesanan baju.";

    window.open(
        "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan),
        "_blank"
    );
}

render();
</script>

</body>
</html>
