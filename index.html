<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pemesanan Baju</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2196F3">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
* { box-sizing: border-box; font-family: Arial, sans-serif; }

body {
    margin: 0;
    padding: 10px;
    background: #f4f4f4;
}

.container {
    max-width: 700px;
    margin: auto;
    background: #fff;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h2 { text-align: center; }

input[type="text"] {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

label { font-weight: bold; display: block; margin-top: 10px; }

.radio-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

button {
    padding: 10px;
    margin: 5px 3px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.btn { background: #2196F3; color: white; }
.delete-btn { background: red; color: white; }

table {
    width: 100%;
    margin-top: 15px;
    border-collapse: collapse;
    font-size: 13px;
}

th, td {
    padding: 8px;
    border: 1px solid #ddd;
    text-align: center;
}

.sent {
    background: #c8f7c5;
}
</style>
</head>

<body>

<div class="container">
<h2>PEMESANAN BAJU</h2>

<div style="background:#fff3cd; padding:10px; border-radius:8px; border:1px solid #ffeeba; margin-bottom:15px;">
<b style="color:#856404;">
BILA MEMASUKAN LEBIH DARI 1 ORDERAN BAJU HARAP KLIK SIMPAN DAHULU DAN JIKA SUDAH SEMUANYA BENAR KLIK KIRIM KE GOOGLE SHEET
</b>
</div>

<input type="text" id="nama" placeholder="Nama">

<label>Size:</label>
<div class="radio-group" onchange="toggleSize()">
<input type="radio" name="size" value="XS" checked> XS
<input type="radio" name="size" value="S"> S
<input type="radio" name="size" value="M"> M
<input type="radio" name="size" value="L"> L
<input type="radio" name="size" value="XL"> XL
<input type="radio" name="size" value="XXL"> XXL
<input type="radio" name="size" value="XXXL"> XXXL
<input type="radio" name="size" value="Lainnya"> Lainnya
</div>

<input type="text" id="sizeLainnya" placeholder="Isi size lainnya..." style="display:none;">

<label>Lengan:</label>
<div class="radio-group">
<input type="radio" name="lengan" value="Pendek" checked> Pendek
<input type="radio" name="lengan" value="Panjang"> Panjang
</div>

<label>Kategori Umur:</label>
<div class="radio-group">
<input type="radio" name="umur" value="Dewasa" checked> Dewasa
<input type="radio" name="umur" value="Anak-Anak"> Anak-Anak
</div>

<label>Gender:</label>
<div class="radio-group">
<input type="radio" name="gender" value="Cowok" checked> Cowok
<input type="radio" name="gender" value="Cewek"> Cewek
</div>

<input type="text" id="hp" placeholder="No HP (boleh kosong)">

<button class="btn" onclick="simpan()">Simpan</button>
<button class="btn" onclick="exportExcel()">Export Excel</button>
<button class="btn" onclick="kirimKeSheet()">Kirim ke Google Sheet</button>

<table>
<thead>
<tr>
<th>Nama</th><th>Size</th><th>Lengan</th><th>Umur</th><th>Gender</th><th>No HP</th><th>Waktu</th><th>Status</th><th>Aksi</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<script>
let data = JSON.parse(localStorage.getItem("orders")) || [];
let sentData = JSON.parse(localStorage.getItem("sent")) || [];

// TOGGLE SIZE
function toggleSize(){
let val = document.querySelector('input[name="size"]:checked').value;
let input = document.getElementById("sizeLainnya");

if(val === "Lainnya"){
    input.style.display = "block";
}else{
    input.style.display = "none";
    input.value = "";
}
}

// CEK DUPLIKAT GLOBAL
function isDuplicate(newData){
return [...data, ...sentData].some(d =>
d.nama===newData.nama &&
d.size===newData.size &&
d.lengan===newData.lengan &&
d.umur===newData.umur &&
d.gender===newData.gender &&
d.hp===newData.hp
);
}

// AMBIL FORM
function ambilForm(){
let nama = document.getElementById("nama").value.trim();
let size = document.querySelector('input[name="size"]:checked').value;
let hp = document.getElementById("hp").value.trim();
let lengan = document.querySelector('input[name="lengan"]:checked').value;
let umur = document.querySelector('input[name="umur"]:checked').value;
let gender = document.querySelector('input[name="gender"]:checked').value;

if(size==="Lainnya"){
size=document.getElementById("sizeLainnya").value.trim();
}

if(!nama||!size||!lengan||!umur||!gender){
alert("Semua wajib kecuali HP");
return null;
}

return {nama,size,lengan,umur,gender,hp,waktu:new Date().toLocaleString(),status:"Belum"};
}

// SIMPAN
function simpan(){
let form = ambilForm();
if(!form) return;

if(isDuplicate(form)){
alert("❌ Data sudah ada / pernah dikirim!");
return;
}

data.push(form);
localStorage.setItem("orders",JSON.stringify(data));
render();
}

// RENDER
function render(){
let tbody=document.getElementById("tbody");
tbody.innerHTML="";
data.forEach((d,i)=>{
tbody.innerHTML+=`<tr class="${d.status==='Terkirim'?'sent':''}">
<td>${d.nama}</td>
<td>${d.size}</td>
<td>${d.lengan}</td>
<td>${d.umur}</td>
<td>${d.gender}</td>
<td>${d.hp}</td>
<td>${d.waktu}</td>
<td>${d.status}</td>
<td><button onclick="hapus(${i})">Hapus</button></td>
</tr>`;
});
}

// HAPUS
function hapus(i){
data.splice(i,1);
localStorage.setItem("orders",JSON.stringify(data));
render();
}

// EXPORT
function exportExcel(){
let ws=XLSX.utils.json_to_sheet(data);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Data");
XLSX.writeFile(wb,"data.xlsx");
}

// KIRIM
function kirimKeSheet(){
let form = ambilForm();

// KIRIM LANGSUNG
if(data.length===0 && form){
if(isDuplicate(form)){
alert("❌ Data sudah pernah dikirim!");
return;
}
kirim(form);
resetForm();
alert("✅ Langsung terkirim!");
return;
}

// KIRIM SEMUA
data.forEach(d=>{
if(d.status==="Terkirim") return;
kirim(d);
d.status="Terkirim";
sentData.push(d);
});

// SIMPAN
localStorage.setItem("sent",JSON.stringify(sentData));

// HAPUS TABEL
data=[];
localStorage.removeItem("orders");
render();

alert("✅ Semua data terkirim & tabel dikosongkan");
}

// PROSES KIRIM
function kirim(d){
let f=new FormData();
f.append("entry.602917443",d.nama);
f.append("entry.1125006949",d.size);
f.append("entry.851126045",d.lengan);
f.append("entry.472633795",d.umur);
f.append("entry.172735209",d.gender);
f.append("entry.1294797526",d.hp);
f.append("entry.804883247",d.waktu);

fetch("https://docs.google.com/forms/u/0/d/e/1FAIpQLSe2Zhoa4FgmAjjytXKS-_onOXQQwt4xlfb_P8vYAYg0DWZajQ/formResponse",
{method:"POST",mode:"no-cors",body:f});
}

// RESET FORM
function resetForm(){
document.getElementById("nama").value="";
document.getElementById("hp").value="";
document.getElementById("sizeLainnya").value="";
document.getElementById("sizeLainnya").style.display="none";
}

// INIT
render();

// SERVICE WORKER
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js').then(r=>r.update());
}
</script>

</body>
</html>
